<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="assets/unihelp_logo.png" alt="UniHelp Logo" class="login-logo">
      <h2 class="login-title">Connexion à UniHelp</h2>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="email" name="email" type="email" required>
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Mot de passe</mat-label>
        <input matInput [(ngModel)]="password" name="password" type="password" required>
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="!email || !password" class="login-button">
        <mat-icon>login</mat-icon>
        Se connecter
      </button>
    </form>

    <div class="footer-section">
      <p class="footer-text">
        Pas de compte ?
        <a routerLink="/register" class="register-link">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
